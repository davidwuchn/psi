name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  # ── fmt + lint ────────────────────────────────────────────────────────────
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven + Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: clojure-${{ runner.os }}-

      - name: Install Clojure & Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Check formatting
        run: bb fmt:check

      - name: Lint
        run: bb lint

  # ── Clojure tests ─────────────────────────────────────────────────────────
  clojure-test:
    name: Clojure Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven + Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: clojure-${{ runner.os }}-

      - name: Install Clojure & Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Run Clojure tests
        run: bb clojure:test

  # ── Emacs tests ───────────────────────────────────────────────────────────
  emacs-test:
    name: Emacs Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven + Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: clojure-${{ runner.os }}-

      - name: Install Clojure & Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Install Emacs (latest stable)
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run Emacs tests
        run: bb emacs:check
