name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  # ── fmt + lint ────────────────────────────────────────────────────────────
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven + Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: clojure-${{ runner.os }}-

      - name: Install Clojure & Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Install clj-kondo
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/clj-kondo/clj-kondo/releases/latest \
            | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": "v\(.*\)".*/\1/')
          curl -fsSL "https://github.com/clj-kondo/clj-kondo/releases/download/v${VERSION}/clj-kondo-${VERSION}-linux-amd64.zip" \
            -o /tmp/clj-kondo.zip
          sudo unzip -q /tmp/clj-kondo.zip -d /usr/local/bin
          clj-kondo --version

      - name: Install cljfmt
        run: |
          VERSION=$(python3 - <<'PY'
          import json, urllib.request
          with urllib.request.urlopen('https://api.github.com/repos/weavejester/cljfmt/releases/latest') as r:
              print(json.load(r)['tag_name'].removeprefix('v'))
          PY
          )
          curl -fsSL "https://github.com/weavejester/cljfmt/releases/download/${VERSION}/cljfmt-${VERSION}-linux-amd64.tar.gz" \
            -o /tmp/cljfmt.tar.gz
          tar -xzf /tmp/cljfmt.tar.gz -C /tmp
          sudo install /tmp/cljfmt /usr/local/bin/cljfmt
          cljfmt --version

      - name: Format check
        run: bb fmt:check

      - name: Lint
        run: bb lint

  # ── Clojure tests ─────────────────────────────────────────────────────────
  clojure-test:
    name: Clojure Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven + Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: clojure-${{ runner.os }}-

      - name: Install Clojure & Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Run Clojure tests
        run: bb clojure:test

  # ── Emacs tests ───────────────────────────────────────────────────────────
  emacs-test:
    name: Emacs Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven + Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: clojure-${{ runner.os }}-

      - name: Install Clojure & Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Install Emacs (latest stable)
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run Emacs tests
        run: bb emacs:check
